*{box-sizing:border-box;margin:0;padding:0}

button{cursor:pointer;font-family:inherit}

.title-box{text-align:center;margin-bottom:8px}

function getBonus(sk){
  if(sk.bo != null) return sk.bo;
  return DEFAULT_BONUS[sk.type] || 400;
}

// 前提チェーンの最上位（pre=nullになるまで遡る）を返す
function getTopSkill(sk){
  let cur = sk;
  const visited = new Set();
  while(cur.pre != null){
    if(visited.has(cur.id)) break;
    visited.add(cur.id);
    const parent = skillMap[cur.pre];
    if(!parent) break;
    cur = parent;
  }
  return cur;
}

// ヒントLvごとの実消費SP（CSVのhs配列を使用。0=ヒントなし→baseSP）
function calcSP(sk, hintLv, kiremono){
  // 進化スキルはSP0（例外を除く）— ボーナス例外と同じ名前リストで判定
  const EVOLVED_SP_KEEP = ["ずっとずっと輝いて","黄金を訪ねて"];
  if(sk.type === "evolved" && !EVOLVED_SP_KEEP.includes(sk.name)) return 0;

  let sp;
  if(hintLv === 0){
    sp = sk.sp;
    if(kiremono) sp = Math.floor(sp * 0.9);
  } else {
    const h = sk.hs[hintLv-1];
    if(!kiremono){ sp = h; }
    else {
      const bm=[0.9,0.8,0.7,0.65,0.6];
      const km=[0.8,0.7,0.6,0.55,0.5];
      sp = Math.floor(h * km[hintLv-1] / bm[hintLv-1]);
    }
  }
  return sp;
}

// 適性倍率: 距離+距離 or 脚質+脚質 → 高い方 / 距離+脚質 → 掛け算
function calcAptMult(apt, ranks){
  if(!apt || !apt.length) return 1.0;
  if(apt.length === 1) return RANK_MULT[ranks[apt[0]] || "G"];
  const cats = apt.map(k => APT_DEF.find(a=>a.key===k)?.category);
  const mults = apt.map(k => RANK_MULT[ranks[k] || "G"]);
  const sameCat = cats.every(c => c === cats[0]);
  return sameCat ? Math.max(...mults) : mults.reduce((a,b)=>a*b, 1);
}

// 各スキルは自身の基礎評価点のみを使用（前提スキルの評価点は合算しない）
function calcChainBaseScore(sk){
  return sk.bs;
}

function calcScore(sk, ranks){
  const top = getTopSkill(sk);
  const aptMult = calcAptMult(top.apt, ranks);
  const chainScore = calcChainBaseScore(sk);
  return chainScore * aptMult + getBonus(sk);
}

// ===== KNAPSACK DP (全件、絞り込みなし) =====
function solveKnapsack(items, capacity){
  if(!items.length || capacity <= 0) return {selected:[], totalScore:0, totalSP:0};
  const n = items.length;
  const dp = Array.from({length:n+1}, () => new Float64Array(capacity+1));
  for(let i=1;i<=n;i++){
    const w = Math.max(0, Math.round(items[i-1].sp));
    const v = items[i-1].score;
    for(let c=0;c<=capacity;c++){
      dp[i][c] = dp[i-1][c];
      if(c >= w && dp[i-1][c-w] + v > dp[i][c]) dp[i][c] = dp[i-1][c-w] + v;
    }
  }
  const selected = [];
  let c = capacity;
  for(let i=n;i>=1;i--){
    if(dp[i][c] !== dp[i-1][c]){
      selected.push(items[i-1]);
      c -= Math.max(0, Math.round(items[i-1].sp));
    }
  }
  return {selected, totalScore: dp[n][capacity], totalSP: selected.reduce((s,x)=>s+Math.max(0,Math.round(x.sp)),0)};
}

  state.selectedSkills = state.selectedSkills.filter(s=>s.id!==id);

// 前提チェーンを末端(白)から順に並べた配列を返す [白, 金, 進化] のように
function getChainFromRoot(sk){
  const chain = [];
  let cur = sk;
  const visited = new Set();
  while(cur){
    if(visited.has(cur.id)) break;
    visited.add(cur.id);
    chain.unshift(cur);
    cur = cur.pre != null ? skillMap[cur.pre] : null;
  }
  return chain;
}

  const rootGroups = new Map(); // rootId -> Set(skill ids in selectedSkills belonging to this chain)
  state.selectedSkills.forEach(sk=>{
    const chain = getChainFromRoot(sk).filter(c => selectedIdSet.has(c.id) || c.id === sk.id);
    // chain内で「選択リストに含まれない」ものがあれば、そこで途切れる＝そこより上は無効
    // 実際の有効チェーン: ルートから順に選択リストに入っているものだけを連続して取る
    const validChain = [];
    for(const c of getChainFromRoot(sk)){
      if(selectedIdSet.has(c.id)) validChain.push(c);
      else break; // 前提が選択されていない場合はそこで切れる
    }
    // sk自身が途中で切れて含まれない場合（前提未選択）→ このスキル単体は使えない
    if(!validChain.find(c=>c.id===sk.id)) return;

    const rootId = validChain[0].id;
    if(!rootGroups.has(rootId)) rootGroups.set(rootId, new Set());
    rootGroups.get(rootId).add(sk.id);
  });

  // 各ルートグループについて「どこまで段階的に取るか」の選択肢を作る
  // 例: [白,金,進化] のグループなら選択肢は 白のみ / 白+金 / 白+金+進化 の3通り(+取らない)
  const groupOptions = []; // [{rootId, options:[{ids:[...], sp, score}, ...]}]
  rootGroups.forEach((idSet, rootId)=>{
    const root = skillMap[rootId];
    const fullChain = getChainFromRoot(root.type==="white"||root.pre==null ? root : root); // rootは既にルート
    // rootからスタートして、選択リストに含まれる範囲で段階的チェーンを構築
    // rootGroups内のidSetに含まれるスキルだけを使い、pre関係でソートする
    const groupSkills = [...idSet].map(id=>skillMap[id]);
    // ソート: pre==null(またはルート)が先頭、以降はpreが直前のものを繋ぐ
    const sorted = [];
    let cur = groupSkills.find(s=>s.id===rootId);
    const remaining = new Set(groupSkills.map(s=>s.id));
    while(cur){
      sorted.push(cur);
      remaining.delete(cur.id);
      const next = groupSkills.find(s=>s.pre===cur.id && remaining.has(s.id));
      cur = next || null;
    }

    const options = [];
    let cumSp = 0, cumScore = 0;
    const ids = [];
    for(const sk of sorted){
      const c = itemsCalc(sk);
      cumSp += Math.max(0, Math.round(c.sp));
      cumScore += c.score;
      ids.push(sk.id);
      options.push({ids:[...ids], sp:cumSp, score:cumScore, items:sorted.slice(0,ids.length).map(itemsCalc)});
    }
    groupOptions.push({rootId, options});
  });

  // グループ単位ナップサックDP: 各グループから「取らない」か「options[k]を取る」かを選ぶ
  const capacity = Math.round(state.spBudget);
  const G = groupOptions.length;
  const dp = Array.from({length:G+1}, ()=>new Float64Array(capacity+1));
  const choice = Array.from({length:G+1}, ()=>new Array(capacity+1).fill(-1)); // 選んだoptionsのindex(-1=取らない)

  for(let g=1; g<=G; g++){
    const opts = groupOptions[g-1].options;
    for(let c=0;c<=capacity;c++){
      let best = dp[g-1][c];
      let bestIdx = -1;
      for(let k=0;k<opts.length;k++){
        const sp = opts[k].sp;
        if(sp<=c && dp[g-1][c-sp]+opts[k].score > best){
          best = dp[g-1][c-sp]+opts[k].score;
          bestIdx = k;
        }
      }
      dp[g][c] = best;
      choice[g][c] = bestIdx;
    }
  }

  // 復元
  let c = capacity;
  let selected = [];
  for(let g=G; g>=1; g--){
    const idx = choice[g][c];
    if(idx >= 0){
      const opt = groupOptions[g-1].options[idx];
      selected = selected.concat(opt.items);
      c -= opt.sp;
    }
  }

  const totalScore = Math.round(dp[G][capacity]);
  const totalSP = selected.reduce((s,x)=>s+Math.max(0,Math.round(x.sp)),0);

  state.result = { selected, totalScore, totalSP };
  render();
}

function handleAddCustomSkill(){
  const f = state.customForm;
  if(!f.name.trim()){ alert("スキル名を入力してください"); return; }
  const baseSp = Number(f.sp)||0;
  // ヒントLv1〜5のSPを基礎SP×倍率で自動算出
  const hs = [1,2,3,4,5].map(lv => Math.floor(baseSp * HINT_LV_MULT[lv]));
  const newSkill = {
    id: state.customNextId--,
    name: f.name.trim(),
    bs: Number(f.bs)||0,
    sp: baseSp,
    hs,
    type: f.type,
    apt: [...f.apt],
    dart: false,
    pre: null,
    bo: null,
  };
  skillMap[newSkill.id] = newSkill;
  handleAdd(newSkill);
  state.customForm = { name:"", bs:300, sp:200, type:"white", apt:[] };
  state.showCustomForm = false;
  render();
}

function toggleCustomApt(key){
  const apt = state.customForm.apt;
  const idx = apt.indexOf(key);
  if(idx>=0) apt.splice(idx,1);
  else apt.push(key);
  render();
}

// ===== RENDER HELPERS =====
function aptLabel(key){
  return APT_DEF.find(a=>a.key===key)?.label || key;
}

function renderAptSection(){
  let html = `<div class="section"><div class="section-title">🎯 ウマ娘の適性ランク</div>`;
  for(const cat of ["距離","脚質"]){
    html += `<div class="apt-group"><div class="apt-group-label">${cat==="距離"?"距離（バ場）適性":"脚質適性"}</div><div class="apt-row">`;
    APT_DEF.filter(a=>a.category===cat).forEach(a=>{
      html += `<div class="apt-item"><span>${a.label}</span>
        <select class="sel" onchange="onAptRankChange('${a.key}',this.value)">
          ${RANK_OPTIONS.map(r=>`<option value="${r}" ${state.aptRanks[a.key]===r?'selected':''}>${r}（×${RANK_MULT[r]}）</option>`).join('')}
        </select></div>`;
    });
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

function renderSpSection(){
  return `<div class="section">
    <div class="section-title">⚙️ SP・設定</div>
    <div class="row-wrap">
      <label style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px">利用可能SP上限</span>
        <input type="number" class="inp" style="width:90px" value="${state.spBudget}" min="0" oninput="onSpBudgetChange(this.value)">
        <span style="font-size:12px;color:#9b8fc0">pt</span>
      </label>
      <label class="chk-label">
        <input type="checkbox" ${state.kiremono?'checked':''} onchange="onKiremonoChange(this.checked)">
        <span>切れ者（ヒントLv倍率 -0.1）</span>
      </label>
    </div>
  </div>`;
}

function renderSearchDropdown(){
  const q = state.searchQuery.trim();
  if(!state.searchFocused || q.length===0) return '';
  const selectedIds = new Set(state.selectedSkills.map(s=>s.id));
  const filtered = SKILLS_DATA.filter(s=>s.name.includes(q) || String(s.id)===q).slice(0,30);

  if(filtered.length===0){
    return `<div class="dropdown"><div class="dd-empty">見つかりませんでした</div></div>`;
  }

  let html = `<div class="dropdown">`;
  filtered.forEach(sk=>{
    const already = selectedIds.has(sk.id);
    const c = TYPE_COLOR[sk.type];
    const aptStr = (sk.apt||[]).map(aptLabel).join('・');
    html += `<div class="dd-item ${already?'already':''}" onclick="${already?'':'onPickSkill('+sk.id+')'}">
      <span class="tbadge" style="background:${c.badge};color:${c.badgeText}">${TYPE_LABEL[sk.type]}</span>
      <span style="flex:1;color:#e8e0ff">${sk.name}</span>
      ${aptStr?`<span style="font-size:10px;color:#60a5fa">${aptStr}</span>`:''}
      <span style="font-size:11px;color:#9b8fc0">${sk.bs}pt</span>
      ${already?'<span style="font-size:10px;color:#6ee7b7">追加済</span>':''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderSelectedSkillRow(sk){
  const c = TYPE_COLOR[sk.type];
  const hintLv = state.hintLvs[sk.id] ?? 0;
  const sp = calcSP(sk, hintLv, state.kiremono);
  const aptLabels = (sk.apt||[]).map(aptLabel);
  const mult = calcAptMult(sk.apt, state.aptRanks);

  let aptInfo = '';
  if(aptLabels.length>0){
    let modeStr = '';
    if(aptLabels.length===2){
      const cats = sk.apt.map(k=>APT_DEF.find(a=>a.key===k)?.category);
      modeStr = ` (${cats[0]===cats[1]?'高い方':'掛算'})`;
    }
    aptInfo = `<span class="skill-apt-tag">${aptLabels.join('・')}${modeStr} ×${mult.toFixed(3)}</span>`;
  }

  return `<div class="skill-row" style="background:${c.bg};border:1px solid ${c.border}">
    <span class="tbadge" style="background:${c.badge};color:${c.badgeText}">${TYPE_LABEL[sk.type]}</span>
    <span class="skill-name">${sk.name}${sk.id<0?' <span style="font-size:9px;color:#a855f7">(自作)</span>':''}</span>
    ${aptInfo}
    <span class="skill-base">基礎:${sk.bs}</span>
    <div class="hint-sel-wrap">
      <span>ヒント</span>
      <select class="sel" style="font-size:11px;padding:2px 4px" onchange="onHintLvChange(${sk.id},this.value)">
        ${[0,1,2,3,4,5].map(lv=>`<option value="${lv}" ${hintLv===lv?'selected':''}>${lv===0?'なし':'Lv'+lv}</option>`).join('')}
      </select>
    </div>
    <span class="sp-tag">${sp}SP</span>
    <button class="remove-btn" onclick="onRemoveSkill(${sk.id})">✕</button>
  </div>`;
}

function renderSkillSection(){
  const totalSP = state.selectedSkills.reduce((s,sk)=>s+calcSP(sk,state.hintLvs[sk.id]??0,state.kiremono),0);
  let html = `<div class="section">
    <div class="section-title" id="skill-section-title">📋 スキル選択 （${state.selectedSkills.length}件 / 合計SP: ${totalSP}pt）</div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="スキル名で検索（例：アガッてきた）" value="${state.searchQuery}"
        oninput="onSearchInput(this.value)" onfocus="onSearchFocus(true)" onblur="onSearchFocus(false)">
      <button class="search-clear" id="search-clear-btn" onclick="onSearchClear()" style="display:${state.searchQuery?'':'none'}">✕</button>
      <div id="search-dropdown-mount">${renderSearchDropdown()}</div>
    </div>
    <div id="selected-skill-list">`;

  if(state.selectedSkills.length===0){
    html += `<div class="empty-msg">スキル名を検索して追加してください</div>`;
  } else {
    state.selectedSkills.forEach(sk=>{ html += renderSelectedSkillRow(sk); });
  }
  html += `</div>`;

  // カスタムスキル追加フォーム
  html += `<div id="custom-form-mount">${renderCustomForm()}</div>`;

  html += `</div>`;
  return html;
}

function renderCustomForm(){
  const f = state.customForm;
  if(!state.showCustomForm){
    return `<div style="margin-top:10px;text-align:center">
      <button class="add-custom-btn" onclick="onToggleCustomForm()">＋ 新しいスキルを追加</button>
    </div>`;
  }

  let html = `<div class="add-custom-box">
    <div class="add-custom-title">✨ 新しいスキルを登録（CSVにないスキル用）</div>
    <div class="custom-form-row">
      <label>名前</label>
      <input type="text" class="inp" style="flex:1;min-width:120px" value="${f.name}" oninput="onCustomField('name',this.value)" placeholder="スキル名">
    </div>
    <div class="custom-form-row">
      <label>種別</label>
      <select class="sel" onchange="onCustomField('type',this.value)">
        ${["white","gold","evolved","inherited"].map(t=>`<option value="${t}" ${f.type===t?'selected':''}>${TYPE_LABEL[t]}</option>`).join('')}
      </select>
      <label>基礎点</label>
      <input type="number" class="inp" style="width:70px" value="${f.bs}" oninput="onCustomField('bs',this.value)">
      <label>基礎SP</label>
      <input type="number" class="inp" style="width:70px" value="${f.sp}" oninput="onCustomField('sp',this.value)">
    </div>
    <div class="custom-form-row" style="color:#9b8fc0;font-size:10px">
      💡 ヒントLv1〜5のSPは基礎SP×倍率（0.9/0.8/0.7/0.65/0.6）で自動算出されます
    </div>
    <div class="custom-form-row" style="align-items:flex-start">
      <label style="margin-top:4px">適性</label>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${APT_DEF.map(a=>`<span class="apt-chip ${f.apt.includes(a.key)?'active':''}" onclick="onToggleCustomApt('${a.key}')">${a.label}</span>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="add-custom-btn" onclick="onAddCustomSkill()">追加してリストに入れる</button>
      <button class="add-custom-btn" style="background:rgba(255,255,255,0.1)" onclick="onToggleCustomForm()">キャンセル</button>
    </div>
  </div>`;
  return html;
}

function renderSolveButton(){
  return `<div class="solve-btn-wrap">
    <button class="solve-btn" onclick="handleSolve()">🏆 最適スキルを計算する</button>
  </div>`;
}

function renderResultSection(){
  if(!state.result) return '';
  const r = state.result;
  const typeOrder = {evolved:0,gold:1,inherited:1,white:2};
  const sorted = [...r.selected].sort((a,b)=>(typeOrder[a.type]??3)-(typeOrder[b.type]??3));

  let html = `<div class="section">
    <div class="section-title">🏆 最適解</div>
    <div class="result-stats">
      <div class="stat"><div class="stat-label">総スコア</div><div class="stat-val" style="color:#f59e0b">${r.totalScore.toLocaleString()}</div><div class="stat-unit">pts</div></div>
      <div class="stat"><div class="stat-label">使用SP</div><div class="stat-val" style="color:#a78bfa">${r.totalSP.toLocaleString()}</div><div class="stat-unit">/ ${state.spBudget}</div></div>
      <div class="stat"><div class="stat-label">取得スキル数</div><div class="stat-val" style="color:#34d399">${r.selected.length}</div><div class="stat-unit">個</div></div>
    </div>
    <div>`;

  sorted.forEach((item,i)=>{
    const c = TYPE_COLOR[item.type];
    const top = getTopSkill(item);
    const aptMult = calcAptMult(top.apt, state.aptRanks);
    const chainScore = calcChainBaseScore(item);
    const bonus = getBonus(item);
    const total = Math.round(chainScore*aptMult + bonus);
    const aptLabels = (top.apt||[]).map(k=>`${aptLabel(k)}:${state.aptRanks[k]||'G'}`);

    html += `<div class="result-item" style="background:${c.bg};border:1px solid ${c.border}">
      <span class="result-idx">${i+1}</span>
      <span class="tbadge" style="background:${c.badge};color:${c.badgeText}">${TYPE_LABEL[item.type]}</span>
      <span class="result-name">${item.name}</span>
      ${aptLabels.length?`<span class="result-apt">${aptLabels.join('・')}（×${aptMult.toFixed(3)}）</span>`:''}
      <span class="result-sp">${item.sp}SP</span>
      <span class="result-score" style="color:${c.badgeText}">+${total.toLocaleString()}</span>
    </div>`;
  });

  html += `</div></div>`;
  return html;
}

// ===== MAIN RENDER =====
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderAptSection() + renderSpSection() + renderSkillSection() + renderSolveButton() + renderResultSection();
}

// ===== EVENT HANDLERS (global functions for inline handlers) =====
function onAptRankChange(key, val){ state.aptRanks[key]=val; render(); }
function onSpBudgetChange(val){ state.spBudget = Number(val)||0; }
function onKiremonoChange(checked){ state.kiremono = checked; render(); }
function onSearchInput(val){
  state.searchQuery = val;
  // 入力欄自体は再描画せず、ドロップダウンと×ボタンだけ更新（IME/連続入力を壊さないため）
  const mount = document.getElementById('search-dropdown-mount');
  if(mount) mount.innerHTML = renderSearchDropdown();
  const clearBtn = document.getElementById('search-clear-btn');
  if(clearBtn) clearBtn.style.display = val ? '' : 'none';
}
function onSearchFocus(focused){
  if(focused){
    state.searchFocused = true;
    const mount = document.getElementById('search-dropdown-mount');
    if(mount) mount.innerHTML = renderSearchDropdown();
  } else {
    setTimeout(()=>{
      state.searchFocused = false;
      const mount = document.getElementById('search-dropdown-mount');
      if(mount) mount.innerHTML = renderSearchDropdown();
    }, 150);
  }
}
function onSearchClear(){
  state.searchQuery='';
  const inp = document.getElementById('search-input');
  if(inp) inp.value = '';
  const mount = document.getElementById('search-dropdown-mount');
  if(mount) mount.innerHTML = renderSearchDropdown();
  const clearBtn = document.getElementById('search-clear-btn');
  if(clearBtn) clearBtn.style.display = 'none';
}
function onPickSkill(id){ handleAdd(skillMap[id]); }
function onRemoveSkill(id){ handleRemove(id); }
function onToggleCustomForm(){ state.showCustomForm = !state.showCustomForm; render(); }
function onCustomField(field, val){ state.customForm[field] = val; }
function onToggleCustomApt(key){ toggleCustomApt(key); }
function onAddCustomSkill(){ handleAddCustomSkill(); }

// ===== INIT =====
render();




</script>
</body>
</html>
