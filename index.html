<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>ウマ娘スキルシミュレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d1f;color:#d4ddf0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px;min-height:100vh}
button{cursor:pointer;font-family:inherit}
select{font-family:inherit}
input{font-family:inherit}
textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(100,150,255,0.3);border-radius:2px}

#header{background:linear-gradient(90deg,#0f0a2e,#0a1a3a,#0d2010);border-bottom:1px solid rgba(80,120,220,0.25);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
#header-title{font-size:15px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#header-stats{margin-left:auto;display:flex;gap:10px;align-items:center}
#stat-score{color:#60a5fa;font-weight:800;font-size:15px}
#stat-sp{font-weight:700;font-size:12px}

#tabs{display:flex;background:rgba(0,0,0,0.35);border-bottom:1px solid rgba(80,120,220,0.18);padding:0 14px;overflow-x:auto}
.tab{padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;color:#6677aa;font-weight:400;font-size:12px;white-space:nowrap;flex-shrink:0}
.tab.active{border-bottom:2px solid #60a5fa;color:#60a5fa;font-weight:700}

#content{padding:10px 14px}
.card{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.label{color:#6a7d9e;font-size:11px;min-width:52px}

inp-text,input[type=number],input[type=text]{background:rgba(255,255,255,0.07);border:1px solid rgba(90,130,220,0.35);border-radius:5px;color:#d4ddf0;padding:4px 8px;font-size:13px}
select{background:#090f20;border:1px solid rgba(90,130,220,0.35);border-radius:4px;color:#d4ddf0;padding:3px 5px;font-size:12px}
select option{background:#090f20;color:#d4ddf0}

.btn{padding:5px 11px;border-radius:6px;border:none;font-weight:700;font-size:11px;color:#fff;background:rgba(255,255,255,0.08)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#3b82f6)}
.btn-active{background:linear-gradient(135deg,#6366f1,#3b82f6)}
.btn-green{background:linear-gradient(135deg,#059669,#10b981)}
.btn-blue{background:linear-gradient(135deg,#4f46e5,#2563eb)}

.apt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.apt-cell{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:7px 6px;text-align:center}
.apt-name{color:#8899cc;font-size:10px;margin-bottom:4px}
.apt-mult{font-size:10px;margin-top:4px}

.skill-list{max-height:62vh;overflow-y:auto;padding-right:2px}
.skill-item{border-radius:7px;padding:7px 9px;margin-bottom:4px;cursor:pointer}
.skill-top{display:flex;align-items:center;gap:6px}
.skill-name{flex:1;font-size:12px}
.skill-score{color:#60a5fa;font-weight:800;font-size:12px;flex-shrink:0}
.skill-sp{color:#f59e0b;font-size:10px;flex-shrink:0;min-width:52px;text-align:right}
.skill-cond{margin-top:2px;font-size:10px;color:#6aaa90}
.skill-pre{margin-top:1px;font-size:10px;color:#7788aa}
.hint-row{margin-top:5px;display:flex;align-items:center;gap:4px}
.hint-btn{padding:2px 6px;border-radius:4px;border:none;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.06);color:#6677aa}
.hint-btn.active{color:#fff}
.hint-sp{font-size:10px;color:#f59e0b;margin-left:3px}

.badge{display:inline-block;padding:1px 5px;border-radius:8px;font-size:9px;font-weight:800;flex-shrink:0}

.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.25);border-radius:8px;padding:8px 10px;text-align:center}
.stat-label{font-size:10px;color:#7788aa;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:800}
.stat-sub{font-size:9px;color:#445}

.result-item{border-radius:7px;padding:7px 10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:flex-start}
.result-score{text-align:right;margin-left:10px;flex-shrink:0}
.result-score-val{color:#60a5fa;font-weight:800;font-size:16px}
.result-score-sub{font-size:9px;color:#6677aa}

.filter-row{margin-bottom:8px}
.search-box{width:100%;padding:6px 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(90,130,220,0.35);border-radius:5px;color:#d4ddf0;font-size:13px}

.paste-area{width:100%;height:130px;padding:8px 10px;background:rgba(0,0,0,0.3);border:1px solid rgba(100,150,255,0.3);border-radius:7px;color:#d4ddf0;font-size:12px;resize:vertical}
.info-box{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:11px;line-height:1.8;color:#8899cc}
.warn-box{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:7px;padding:7px 10px;margin-bottom:8px;font-size:11px;color:#fbbf24}
.preview-list{max-height:50vh;overflow-y:auto;background:rgba(0,0,0,0.15);border-radius:7px;padding:6px 8px}
.preview-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.hint-tag{font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0}

.mode-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.empty{color:#445;text-align:center;padding:40px;font-size:13px;line-height:2}

input[type=number]{width:90px;background:rgba(255,255,255,0.07);border:1px solid rgba(90,130,220,0.35);border-radius:5px;color:#d4ddf0;padding:4px 8px;font-size:13px}
input[type=text]{flex:1;min-width:100px;background:rgba(255,255,255,0.07);border:1px solid rgba(90,130,220,0.35);border-radius:5px;color:#d4ddf0;padding:4px 8px;font-size:13px}
input[type=checkbox]{margin:0}
</style>
</head>

const TBD = {white:"rgba(200,208,224,0.15)",gold:"rgba(255,215,0,0.4)",evolved:"rgba(255,140,0,0.4)",inherited:"rgba(168,85,247,0.4)"};
const TL = {white:"白",gold:"金",evolved:"進化",inherited:"継承"};

// ===== STATE =====
const state = {
  aptRanks: Object.fromEntries(ALL_APTS.map(a=>[a,"G"])),
  kiremono: false,
  maxSP: 3000,
  typeFilter: "all",
  searchText: "",
  showCondOnly: false,
  activeTab: "apt",

  resultMode: "manual",
  skillMap: {},
  enrichedMap: {},
};

// build skillMap
ALL_SKILLS.forEach(s => { state.skillMap[s.id] = s; });

// ===== LOGIC =====
function getBonus(sk){
  if(BONUS_EX[sk.name]!==undefined) return BONUS_EX[sk.name];
  if(sk.type==="evolved") return 300;
  if(sk.type==="gold") return 800;
  return 400;
}

function calcSP(sk, hintLv, kiremono){
  if(sk.type==="evolved" && !EVOLVED_SP_EX.includes(sk.name)) return 0;
  let sp;
  if(hintLv===0){
    sp = sk.sp;
    if(kiremono) sp = Math.floor(sp*0.9);
  } else {
    const h = sk.hs[hintLv-1];
    if(!kiremono){ sp=h; }
    else{
      const bm=[0.9,0.8,0.7,0.65,0.6];
      const km=[0.8,0.7,0.6,0.55,0.5];
      sp=Math.floor(h*km[hintLv-1]/bm[hintLv-1]);
    }
  }
  return sp;
}

function getAptMult(cond, ranks){
  if(!cond||!cond.length) return 1.0;
  const dists=cond.filter(c=>DIST_APTS.includes(c));
  const paces=cond.filter(c=>PACE_APTS.includes(c));
  if(cond.every(c=>c==="ダート")) return 1.0;
  const dm=dists.length?Math.max(...dists.map(d=>RANK_MULT[ranks[d]||"G"])):1.0;
  const pm=paces.length?Math.max(...paces.map(p=>RANK_MULT[ranks[p]||"G"])):1.0;
  if(dists.length&&paces.length) return dm*pm;
  if(dists.length) return dm;
  return pm;
}

function calcScore(sk, ranks){
  return Math.floor(sk.bs * getAptMult(sk.cond, ranks)) + getBonus(sk);
}

function getEnriched(){
  return ALL_SKILLS.map(sk=>{
    const lv = state.skillHintLv[sk.id]??0;
    const aptMult = getAptMult(sk.cond, state.aptRanks);
    return {...sk, hintLv:lv, costSP:calcSP(sk,lv,state.kiremono),
      score:calcScore(sk,state.aptRanks), aptMult, bonus:getBonus(sk)};
  });
}

function getDisplayIds(){
  return (state.resultMode==="knapsack"&&state.knapsackIds)
    ? new Set(state.knapsackIds) : state.selected;
}

function getSelStats(enrichedMap){
  const ids = getDisplayIds();
  const skills = [...ids].map(id=>enrichedMap[id]).filter(Boolean);
  return {
    skills,
    totalSP: skills.reduce((s,sk)=>s+sk.costSP,0),
    totalScore: skills.reduce((s,sk)=>s+sk.score,0)
  };
}

function getPrereqIds(id){
  const sk = state.skillMap[id];
  if(!sk) return [];
  const ids=[];
  if(sk.type==="evolved"&&sk.pre){
    const gid=parseInt(sk.pre);
    if(!isNaN(gid)&&state.skillMap[gid]){
      ids.push(gid);
      const g=state.skillMap[gid];
      if(g.low){const wid=parseInt(g.low);if(!isNaN(wid)&&state.skillMap[wid])ids.push(wid);}
    }
  }
  if(sk.type==="gold"&&sk.low){const wid=parseInt(sk.low);if(!isNaN(wid)&&state.skillMap[wid])ids.push(wid);}
  return ids;
}

function getPrereqs(sk){
  const p=[];
  if(sk.efn) p.push({label:"金",name:sk.efn});
  else if(sk.pre&&state.skillMap[parseInt(sk.pre)]) p.push({label:"金",name:state.skillMap[parseInt(sk.pre)].name});
  if(sk.lsn) p.push({label:"白",name:sk.lsn});
  else if(sk.low&&state.skillMap[parseInt(sk.low)]) p.push({label:"白",name:state.skillMap[parseInt(sk.low)].name});
  return p;
}

function runDP(candidates, maxSP){
  if(!candidates.length||maxSP<=0) return [];
  const sorted=[...candidates].filter(c=>c.costSP>0&&c.costSP<=maxSP)
    .sort((a,b)=>b.score/b.costSP-a.score/a.costSP).slice(0,250);
  const dp=new Float32Array(maxSP+1);
  const from=new Array(maxSP+1).fill(null);
  for(const sk of sorted){
    for(let w=maxSP;w>=sk.costSP;w--){
      if(dp[w-sk.costSP]+sk.score>dp[w]){
        dp[w]=dp[w-sk.costSP]+sk.score;
        from[w]={p:w-sk.costSP,id:sk.id};
      }
    }
  }
  const res=[];let w=maxSP;
  while(w>0&&from[w]){res.push(from[w].id);w=from[w].p;}
  return res;
}

function doKnapsack(enrichedArr){
  const cands = enrichedArr.filter(sk=>state.selected.has(sk.id)&&sk.costSP>0)
    .map(sk=>({id:sk.id,costSP:sk.costSP,score:sk.score}));
  if(!cands.length){alert("スキルを選択してから最適化してください。");return;}
  state.knapsackIds = runDP(cands, state.maxSP);
  state.resultMode = "knapsack";
  render();
}

}

      <span style="color:#6677aa;font-size:11px">pt</span>

function renderSkills(enrichedArr){
  const displayIds = getDisplayIds();
  const filtered = enrichedArr.filter(sk=>{
    if(state.typeFilter!=="all"&&sk.type!==state.typeFilter) return false;
    if(state.showCondOnly&&sk.cond.length===0) return false;
    if(state.searchText&&!sk.name.includes(state.searchText)) return false;
    return true;
  });

  let html = `
  <div class="card">
    <div style="margin-bottom:7px">
      <input type="text" id="inp-search" value="${state.searchText}" placeholder="スキル名検索..." style="width:100%;padding:6px 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(90,130,220,0.35);border-radius:5px;color:#d4ddf0;font-size:13px" oninput="onSearch(this.value)">
    </div>
    <div class="row">
      ${[["all","全種別"],["white","白"],["gold","金"],["evolved","進化"],["inherited","継承"]].map(([k,v])=>
        `<button class="btn ${state.typeFilter===k?'btn-active':''}" onclick="onTypeFilter('${k}')">${v}</button>`
      ).join('')}
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:auto">
        <input type="checkbox" ${state.showCondOnly?'checked':''} onchange="onCondOnly(this.checked)">
        <span style="font-size:10px;color:#6677aa">適性条件あり</span>
      </label>
    </div>
  </div>
  <div class="row" style="margin-bottom:8px">
    <button class="btn btn-green" onclick="onKnapsack()">🎯 選択スキルを最適化</button>
    <button class="btn" onclick="onReset()">🗑 リセット</button>
    <span style="color:#6677aa;font-size:10px">${filtered.length}件/${ALL_SKILLS.length}件</span>
    <button class="btn btn-blue" style="margin-left:auto" onclick="setTab('result')">結果 →</button>
  </div>
  <div class="skill-list">`;

  const shown = filtered.slice(0,400);
  for(const sk of shown){
    const isSel = displayIds.has(sk.id);
    const isAuto = isSel && !state.selected.has(sk.id) && state.resultMode==="manual";
    const prereqs = getPrereqs(sk);
    const lv = sk.hintLv;
    const bg = isAuto?'linear-gradient(135deg,rgba(245,158,11,0.12),rgba(96,165,250,0.06))':
               isSel?`linear-gradient(135deg,${TBG[sk.type]},rgba(96,165,250,0.1))`:TBG[sk.type];
    const border = isAuto?'#f59e0b':isSel?TC[sk.type]:TBD[sk.type];

    html += `<div class="skill-item" style="background:${bg};border:1px solid ${border}" data-id="${sk.id}">
      <div class="skill-top" onclick="onToggle(${sk.id})">
        ${badge(sk.type)}
        <span class="skill-name" style="font-weight:${isSel?700:400}">
          ${sk.name}
          ${isAuto?`<span style="margin-left:5px;font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(245,158,11,0.25);color:#f59e0b;font-weight:700">前提・自動</span>`:''}
        </span>
        <span class="skill-score">${sk.score}pt</span>
        <span class="skill-sp">SP:${sk.costSP}</span>
      </div>`;

    if(sk.cond.length){
      const multStr = sk.aptMult!==1.0?`<span style="color:${sk.aptMult>1?'#34d399':'#f87171'};margin-left:5px;font-weight:700">×${sk.aptMult.toFixed(2)}</span>`:'';
      html += `<div class="skill-cond">条件:${sk.cond.join('・')}${multStr}</div>`;
    }
    if(prereqs.length){
      html += `<div class="skill-pre">${prereqs.map(p=>`<span style="margin-right:8px"><span style="font-size:9px;font-weight:700;color:${p.label==='金'?'#ffd700':'#b0bcd0'};margin-right:3px">[${p.label}]</span>${p.name}</span>`).join('')}</div>`;
    }
    if(isSel){
      html += `<div class="hint-row" onclick="event.stopPropagation()">
        <span style="font-size:10px;color:#7788aa;min-width:52px">ヒントLv</span>
        ${[0,1,2,3,4,5].map(lvNum=>{
          const active = lv===lvNum;
          const bg2 = active?(lvNum===0?'rgba(255,255,255,0.2)':`hsl(${200+lvNum*20},70%,45%)`):'rgba(255,255,255,0.06)';
          const col2 = active?'#fff':'#6677aa';
          return `<button class="hint-btn${active?' active':''}" style="background:${bg2};color:${col2}" onclick="onHintLv(${sk.id},${lvNum})">${lvNum===0?'なし':'Lv'+lvNum}</button>`;
        }).join('')}
        <span class="hint-sp">→SP:${sk.costSP}</span>
      </div>`;
    }
    html += `</div>`;
  }

  if(filtered.length>400) html += `<div style="color:#556;text-align:center;padding:8px;font-size:11px">検索で絞り込んでください（${filtered.length}件中400件表示）</div>`;
  html += `</div>`;
  return html;
}

  const stats = getSelStats(enrichedMap);
  const isKnap = state.resultMode==="knapsack";

  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-label">合計スコア</div>
      <div class="stat-val" style="color:#60a5fa">${stats.totalScore.toLocaleString()}</div>
      <div class="stat-sub">pts</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">消費SP</div>
      <div class="stat-val" style="color:#34d399">${stats.totalSP}</div>
      <div class="stat-sub" style="color:${stats.totalSP>=state.maxSP*0.95?'#34d399':'#f59e0b'}">/ ${state.maxSP}（残${state.maxSP-stats.totalSP}）</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">取得数</div>
      <div class="stat-val" style="color:#a78bfa">${stats.skills.length}</div>
      <div class="stat-sub">スキル</div>
    </div>
  </div>
  <div class="row" style="margin-bottom:8px">
    <div class="mode-tag" style="background:${isKnap?'rgba(52,211,153,0.15)':'rgba(96,165,250,0.15)'};border:1px solid ${isKnap?'#34d399':'#60a5fa'};color:${isKnap?'#34d399':'#60a5fa'}">
      ${isKnap?'🎯 最適化結果':'📋 手動選択'}
    </div>
    <button class="btn btn-green" onclick="onKnapsack()">再最適化</button>
    <span style="font-size:10px;color:#6677aa">選択中${state.selected.size}件から算出</span>
    <button class="btn" onclick="setTab('skills')">← 選択</button>
  </div>
  <div style="max-height:65vh;overflow-y:auto">`;

  if(!stats.skills.length){
    html += `<div class="empty">スキルが選択されていません。<br>「🔍 選択」タブでスキルを選んで<br>「最適化」を押してください。</div>`;
  } else {
    const sorted = [...stats.skills].sort((a,b)=>b.score-a.score);
    for(const sk of sorted){
      const prereqs = getPrereqs(sk);
      html += `<div class="result-item" style="background:${TBG[sk.type]};border:1px solid ${TC[sk.type]}">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
            ${badge(sk.type)}
            <span style="font-weight:700;font-size:12px">${sk.name}</span>
          </div>
          ${sk.cond.length?`<div style="font-size:10px;color:#6aaa90">条件:${sk.cond.join('・')}${sk.aptMult!==1.0?`<span style="color:${sk.aptMult>1?'#34d399':'#f87171'};margin-left:5px">×${sk.aptMult.toFixed(2)}</span>`:''}</div>`:''}
          ${prereqs.length?`<div style="font-size:10px;color:#7788aa">${prereqs.map(p=>`<span style="margin-right:6px"><span style="font-size:9px;font-weight:700;color:${p.label==='金'?'#ffd700':'#b0bcd0'};margin-right:2px">[${p.label}]</span>${p.name}</span>`).join('')}</div>`:''}
          <div style="margin-top:4px;display:flex;align-items:center;gap:4px">
            <span style="font-size:10px;color:#7788aa">ヒント</span>
            <span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(96,165,250,0.2);color:#60a5fa">${sk.hintLv===0?'なし':'Lv'+sk.hintLv}</span>
            <span style="font-size:10px;color:#f59e0b">SP:${sk.costSP}</span>
          </div>
        </div>
        <div class="result-score">
          <div class="result-score-val">+${sk.score}</div>
          <div class="result-score-sub">${sk.bs}×${sk.aptMult.toFixed(2)}+${sk.bonus}</div>
        </div>
      </div>`;
    }
  }
  html += `</div>`;
  return html;
}

function render(){
  const enrichedArr = getEnriched();
  const enrichedMap = {};
  enrichedArr.forEach(s=>{ enrichedMap[s.id]=s; });
  state.enrichedMap = enrichedMap;

  const stats = getSelStats(enrichedMap);
  document.getElementById('stat-score').textContent = stats.totalScore.toLocaleString() + ' pt';
  const spEl = document.getElementById('stat-sp');
  spEl.textContent = 'SP ' + stats.totalSP + '/' + state.maxSP;
  spEl.style.color = stats.totalSP > state.maxSP ? '#f59e0b' : '#34d399';

  const content = document.getElementById('content');
  switch(state.activeTab){
    case 'apt':    content.innerHTML = renderApt(); bindApt(); break;
    case 'scan':   content.innerHTML = renderScan(); bindScan(); break;
    case 'skills': content.innerHTML = renderSkills(enrichedArr); break;
    case 'result': content.innerHTML = renderResult(enrichedMap); break;
  }
}

// ===== EVENT HANDLERS =====
function setTab(tab){
  state.activeTab = tab;
  document.querySelectorAll('.tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===tab);
  });
  render();
}

document.querySelectorAll('.tab').forEach(el=>{
  el.addEventListener('click', ()=>setTab(el.dataset.tab));
});

function bindApt(){
  const maxspEl = document.getElementById('inp-maxsp');
  if(maxspEl) maxspEl.addEventListener('input', e=>{
    state.maxSP = parseInt(e.target.value)||0; render();
  });
  const kireEl = document.getElementById('chk-kire');
  if(kireEl) kireEl.addEventListener('change', e=>{
    state.kiremono = e.target.checked; render();
  });
}

function onAptChange(el){
  state.aptRanks[el.dataset.apt] = el.value;
  render();
}

// scan tab state
let scanPreview = [];
let scanUnmatched = [];

function bindScan(){
  const ta = document.getElementById('paste-text');
  if(ta) ta.addEventListener('input', e=>{
    if(e.target.value) parsePaste(e.target.value);
    else { scanPreview=[]; scanUnmatched=[]; updateScanPreview(); }
  });
}

function parsePaste(text){
  const nameMap = {};
  ALL_SKILLS.forEach(s=>{ nameMap[s.name]=s; });
  const lines = text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const matched=[], um=[];
  lines.forEach(line=>{
    const lm = line.match(/ヒント\s*Lv\s*(\d)/i) || line.match(/Lv\s*(\d)/i) || line.match(/\s(\d)\s*$/);
    const hintLv = lm ? Math.min(5,parseInt(lm[1])) : 0;
    const sname = line.replace(/ヒント\s*Lv\s*\d/i,'').replace(/Lv\s*\d/i,'').replace(/\s+\d\s*$/,'').trim();
    if(!sname) return;
    const sk = nameMap[sname];
    if(sk){ matched.push({skill:sk,hintLv}); return; }
    const partial = ALL_SKILLS.find(s=>s.name.includes(sname)||sname.includes(s.name));
    if(partial){ matched.push({skill:partial,hintLv,fuzzy:true}); return; }
    um.push(sname);
  });
  scanPreview = matched;
  scanUnmatched = um;
  updateScanPreview();
}

function updateScanPreview(){
  const status = document.getElementById('paste-status');
  const warn = document.getElementById('paste-warn');
  const preview = document.getElementById('paste-preview');
  if(!status||!warn||!preview) return;

  status.textContent = scanPreview.length ? `${scanPreview.length}件マッチ${scanUnmatched.length?'、'+scanUnmatched.length+'件未一致':''}` : '';
  warn.innerHTML = scanUnmatched.length ? `<div class="warn-box">⚠️ 未一致: ${scanUnmatched.join('、')}</div>` : '';

  if(!scanPreview.length){ preview.innerHTML=''; return; }

  let html = `<div style="margin-bottom:8px">
    <button class="btn btn-green" onclick="onApplyScan()">✅ ${scanPreview.length}件をスキル選択に反映</button>
  </div>
  <div class="preview-list">`;
  scanPreview.forEach(r=>{
    html += `<div class="preview-row">
      ${badge(r.skill.type)}
      <span style="flex:1;color:${r.fuzzy?'#fbbf24':'#d4ddf0'}">${r.skill.name}${r.fuzzy?' ⚠️':''}</span>
      <span class="hint-tag" style="background:${r.hintLv>0?'rgba(96,165,250,0.2)':'rgba(255,255,255,0.06)'};color:${r.hintLv>0?'#60a5fa':'#6677aa'}">${r.hintLv===0?'なし':'Lv'+r.hintLv}</span>
    </div>`;
  });
  html += `</div>`;
  preview.innerHTML = html;
}

function onParsePaste(){
  const ta = document.getElementById('paste-text');
  if(ta&&ta.value) parsePaste(ta.value);
}

function onClearPaste(){
  const ta = document.getElementById('paste-text');
  if(ta) ta.value='';
  scanPreview=[]; scanUnmatched=[];
  updateScanPreview();
}

function onApplyScan(){
  if(!scanPreview.length) return;
  const newHL = {...state.skillHintLv};
  scanPreview.forEach(({skill,hintLv})=>{
    state.selected.add(skill.id);
    newHL[skill.id] = hintLv;
    getPrereqIds(skill.id).forEach(pid=>{
      state.selected.add(pid);
      if(newHL[pid]===undefined) newHL[pid]=0;
    });
  });
  state.skillHintLv = newHL;
  state.resultMode = "manual";
  state.knapsackIds = null;
  setTab('skills');
}

function onToggle(id){
  if(state.selected.has(id)){
    state.selected.delete(id);
  } else {
    state.selected.add(id);
    getPrereqIds(id).forEach(pid=>state.selected.add(pid));
  }
  state.resultMode = "manual";
  state.knapsackIds = null;
  render();
}

function onHintLv(id, lv){
  state.skillHintLv[id] = lv;
  render();
}

function onKnapsack(){
  const enrichedArr = getEnriched();
  doKnapsack(enrichedArr);
}

function onReset(){
  state.selected = new Set();
  state.skillHintLv = {};
  state.knapsackIds = null;
  state.resultMode = "manual";
  render();
}

function onSearch(val){
  state.searchText = val;
  render();
}

function onTypeFilter(val){
  state.typeFilter = val;
  render();
}

function onCondOnly(val){
  state.showCondOnly = val;
  render();
}

// ===== INIT =====
render();
</script>
</body>
</html>
